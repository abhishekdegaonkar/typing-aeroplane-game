<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Airplane Typing Challenge ✈️</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(#87CEEB,#ffffff);
    text-align:center;
    overflow:hidden;
}

h1{margin:10px;}

#gameArea{
    position:relative;
    height:45vh;
    border-top:3px solid black;
    border-bottom:3px solid black;
    overflow:hidden;
}

.runway{
    position:absolute;
    bottom:0;
    width:200%;
    height:80px;
    background:repeating-linear-gradient(
        to right,
        #555 0px,
        #555 40px,
        white 40px,
        white 80px
    );
    animation:runwayMove 2s linear infinite;
}

@keyframes runwayMove{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
}

#plane{
    position:absolute;
    top:40%;
    left:10%;
    width:130px;
    transition:0.2s;
}

#paragraph{
    width:80%;
    margin:15px auto;
    font-size:18px;
    height:150px;
    overflow:auto;
    border:1px solid #ccc;
    padding:10px;
    background:white;
}

#inputBox{
    width:80%;
    padding:10px;
    font-size:18px;
}

#message{
    font-size:22px;
    color:red;
    margin-top:10px;
}

.stats{
    margin:5px;
}
</style>
</head>

<body>

<h1>✈️ Real Airplane Typing Challenge</h1>

<div class="stats">Time: <span id="time">0</span> seconds</div>
<div class="stats">Best Record: <span id="bestTime">--</span></div>
<div class="stats">Level: <span id="level">1</span></div>

<div id="gameArea">
    <div class="runway"></div>
    <img src="https://i.imgur.com/6X4V6wS.png" id="plane">
</div>

<div id="paragraph"></div>
<input type="text" id="inputBox" placeholder="Start typing here...">

<div id="message"></div>

<script>
const paragraphs = [
`A modern airplane is one of the greatest inventions in human history... (LEVEL 1 150+ WORD PARAGRAPH)`
,
`Flying across international skies requires advanced navigation systems... (LEVEL 2 HARDER 150+ WORD PARAGRAPH)`
,
`A commercial aircraft operates through a complex system of aerodynamics... (LEVEL 3 VERY HARD 150+ WORD PARAGRAPH)`
];

let level=0;
let startTime;
let timerInterval;
let lastTypedTime;
let bestTime=localStorage.getItem("bestTime");

if(bestTime){
    document.getElementById("bestTime").textContent=bestTime+" sec";
}

const paragraphDisplay=document.getElementById("paragraph");
const inputBox=document.getElementById("inputBox");
const message=document.getElementById("message");
const plane=document.getElementById("plane");

function startLevel(){
    paragraphDisplay.textContent=paragraphs[level];
    inputBox.value="";
    document.getElementById("level").textContent=level+1;
}

function startTimer(){
    startTime=Date.now();
    timerInterval=setInterval(()=>{
        let currentTime=Math.floor((Date.now()-startTime)/1000);
        document.getElementById("time").textContent=currentTime;
    },1000);
}

function crashPlane(){
    plane.style.top="70%";
    message.textContent="You're Out! ✈️💥";
    clearInterval(timerInterval);
    inputBox.disabled=true;
}

function checkIdle(){
    if(Date.now()-lastTypedTime > 3000){
        crashPlane();
    }
}

setInterval(checkIdle,500);

inputBox.addEventListener("input",()=>{
    if(!startTime){
        startTimer();
    }

    lastTypedTime=Date.now();

    let typed=inputBox.value;
    let original=paragraphs[level];

    if(!original.startsWith(typed)){
        crashPlane();
        return;
    }

    plane.style.left=(10+(typed.length/original.length)*70)+"%";

    if(typed===original){
        level++;
        if(level<paragraphs.length){
            startLevel();
        }else{
            finishGame();
        }
    }
});

function finishGame(){
    clearInterval(timerInterval);
    let totalTime=Math.floor((Date.now()-startTime)/1000);
    inputBox.disabled=true;

    if(!bestTime || totalTime < bestTime){
        localStorage.setItem("bestTime",totalTime);
        message.style.color="green";
        message.textContent="🎉 Congratulations! You set a NEW RECORD in "+totalTime+" seconds!";
    }else{
        message.style.color="blue";
        message.textContent="Game Completed in "+totalTime+" seconds. Try again to beat record!";
    }
}

startLevel();
</script>

</body>
</html>
