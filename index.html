<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Aeroplane Ultimate ✈️</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    transition:0.5s;
}

.day{
    background:linear-gradient(#87CEEB,#ffffff);
    color:black;
}

.night{
    background:linear-gradient(#0f2027,#203a43,#2c5364);
    color:white;
}

h1{margin:10px;}

#gameArea{
    position:relative;
    width:100%;
    height:55vh;
    overflow:hidden;
    border-top:3px solid #000;
    border-bottom:3px solid #000;
}

.runway{
    position:absolute;
    bottom:0;
    width:200%;
    height:100px;
    background:repeating-linear-gradient(
        to right,
        #555 0px,
        #555 40px,
        white 40px,
        white 80px
    );
    animation:runwayMove 2s linear infinite;
}

@keyframes runwayMove{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
}

.plane{
    position:absolute;
    top:40%;
    width:100px;
    transition:0.1s;
}

#plane1{left:10%;}
#plane2{left:10%; top:60%;}

input{
    padding:8px;
    margin:5px;
    font-size:18px;
}

.stats{margin:5px;}

button{
    padding:8px 12px;
    margin:5px;
}
</style>
</head>

<body class="day">

<h1>✈️ Typing Aeroplane Ultimate</h1>

<div class="stats">Player 1 Score: <span id="score1">0</span></div>
<div class="stats">Player 2 Score: <span id="score2">0</span></div>

<button onclick="toggleMode()">Toggle Day/Night</button>

<div id="gameArea">
    <div class="runway"></div>
    <img src="https://i.imgur.com/6X4V6wS.png" class="plane" id="plane1">
    <img src="https://i.imgur.com/6X4V6wS.png" class="plane" id="plane2">
</div>

<div id="word"></div>

<input type="text" id="input1" placeholder="Player 1 Type Here">
<input type="text" id="input2" placeholder="Player 2 Type Here">

<audio id="airportSound" loop>
<source src="https://www.soundjay.com/transportation/airport-ambient-01.mp3">
</audio>

<audio id="crashSound">
<source src="https://www.soundjay.com/mechanical/smash-crash-01.mp3">
</audio>

<script>
const words=[
"airport","flight","runway","navigation",
"cockpit","boarding","destination",
"international","transportation","aerodynamics"
];

let currentWord="";
let score1=0;
let score2=0;

const wordDisplay=document.getElementById("word");
const input1=document.getElementById("input1");
const input2=document.getElementById("input2");
const plane1=document.getElementById("plane1");
const plane2=document.getElementById("plane2");
const crashSound=document.getElementById("crashSound");
const airportSound=document.getElementById("airportSound");

airportSound.play();

function newWord(){
    currentWord=words[Math.floor(Math.random()*words.length)];
    wordDisplay.textContent="Type: "+currentWord;
    input1.value="";
    input2.value="";
}

function movePlane(player){
    if(player===1){
        score1++;
        document.getElementById("score1").textContent=score1;
        plane1.style.left=(10+score1*3)+"%";
    }
    if(player===2){
        score2++;
        document.getElementById("score2").textContent=score2;
        plane2.style.left=(10+score2*3)+"%";
    }
}

function gameOver(){
    crashSound.play();
    input1.disabled=true;
    input2.disabled=true;
}

input1.addEventListener("input",()=>{
    if(!currentWord.startsWith(input1.value)){
        gameOver();
        return;
    }
    if(input1.value===currentWord){
        movePlane(1);
        newWord();
    }
});

input2.addEventListener("input",()=>{
    if(!currentWord.startsWith(input2.value)){
        gameOver();
        return;
    }
    if(input2.value===currentWord){
        movePlane(2);
        newWord();
    }
});

function toggleMode(){
    if(document.body.classList.contains("day")){
        document.body.classList.remove("day");
        document.body.classList.add("night");
    }else{
        document.body.classList.remove("night");
        document.body.classList.add("day");
    }
}

newWord();
</script>

</body>
</html>
