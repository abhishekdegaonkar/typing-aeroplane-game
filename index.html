<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Aeroplane Game ✈️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to top, #87CEEB, #ffffff);
    overflow: hidden;
    text-align: center;
}

h1 {
    margin-top: 10px;
}

#gameArea {
    position: relative;
    width: 100%;
    height: 70vh;
    border-top: 3px solid #333;
    border-bottom: 3px solid #333;
    background: url('https://i.imgur.com/9aX2K5X.png') repeat-x bottom;
    background-size: contain;
}

#plane {
    position: absolute;
    top: 50%;
    left: 10%;
    font-size: 50px;
    transition: transform 0.1s linear;
}

#word {
    font-size: 28px;
    margin-top: 20px;
}

#inputBox {
    padding: 10px;
    font-size: 20px;
    width: 300px;
}

#score, #level {
    font-size: 20px;
    margin: 10px;
}

#gameOver {
    color: red;
    font-size: 30px;
    display: none;
}
</style>
</head>

<body>

<h1>✈️ Typing Aeroplane Game</h1>

<div id="score">Score: 0</div>
<div id="level">Level: 1</div>

<div id="gameArea">
    <div id="plane">✈️</div>
</div>

<div id="word"></div>
<input type="text" id="inputBox" autofocus placeholder="Type here..." />

<div id="gameOver">GAME OVER ❌</div>

<script>
const words = {
    1: ["sky", "fly", "air", "jet", "cloud"],
    2: ["airport", "travel", "engine", "flight", "landing"],
    3: ["navigation", "runway", "cockpit", "altitude", "boarding"],
    4: ["international", "aerodynamics", "transportation", "communication"]
};

let level = 1;
let score = 0;
let currentWord = "";
let plane = document.getElementById("plane");
let wordDisplay = document.getElementById("word");
let inputBox = document.getElementById("inputBox");
let gameOverText = document.getElementById("gameOver");

function newWord() {
    let wordList = words[level];
    currentWord = wordList[Math.floor(Math.random() * wordList.length)];
    wordDisplay.textContent = currentWord;
    inputBox.value = "";
}

function movePlane(speed) {
    let currentLeft = parseFloat(plane.style.left) || 10;
    plane.style.left = (currentLeft + speed) + "%";
}

function levelUp() {
    if(score > 5 && level === 1) level = 2;
    if(score > 10 && level === 2) level = 3;
    if(score > 18 && level === 3) level = 4;

    document.getElementById("level").textContent = "Level: " + level;
}

function gameOver() {
    inputBox.disabled = true;
    gameOverText.style.display = "block";
}

inputBox.addEventListener("input", () => {
    let typed = inputBox.value;

    if(!currentWord.startsWith(typed)) {
        gameOver();
        return;
    }

    if(typed === currentWord) {
        score++;
        document.getElementById("score").textContent = "Score: " + score;
        movePlane(level * 2);
        levelUp();
        newWord();
    }
});

newWord();
</script>

</body>
</html>
