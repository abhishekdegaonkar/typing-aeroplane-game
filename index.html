<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Flight Challenge ✈️</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(#87CEEB,#ffffff);
    text-align:center;
    overflow:hidden;
}

h1{margin:10px;}

#gameArea{
    position:relative;
    width:100%;
    height:50vh;
    border-top:3px solid black;
    border-bottom:3px solid black;
    overflow:hidden;
    background:linear-gradient(to bottom,#4da6ff,#87CEEB);
}

.runway{
    position:absolute;
    bottom:0;
    width:200%;
    height:100px;
    background:repeating-linear-gradient(
        to right,
        #555 0px,
        #555 40px,
        white 40px,
        white 80px
    );
    animation:runwayMove 2s linear infinite;
}

@keyframes runwayMove{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
}

#plane{
    position:absolute;
    top:40%;
    left:10%;
    width:120px;
    transition:0.2s;
}

#paragraph{
    width:80%;
    margin:15px auto;
    font-size:18px;
    height:120px;
    overflow:auto;
    border:1px solid #ccc;
    padding:10px;
    background:white;
}

#inputBox{
    width:80%;
    padding:10px;
    font-size:18px;
}

.stats{
    margin:5px;
    font-size:18px;
}

#message{
    font-size:24px;
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>✈️ Typing Flight Challenge</h1>

<div class="stats">Level: <span id="level">1</span></div>
<div class="stats">Time: <span id="timer">0</span> seconds</div>
<div class="stats">Best Record: <span id="bestTime">None</span></div>

<div id="gameArea">
    <div class="runway"></div>
    <img src="https://i.imgur.com/6X4V6wS.png" id="plane">
</div>

<div id="paragraph"></div>
<input type="text" id="inputBox" placeholder="Start typing to fly...">

<div id="message"></div>

<script>
const paragraphs = [
`A commercial airplane prepares for departure as passengers settle into their seats and the engines begin to hum steadily. The pilot communicates with the control tower while ground staff guide the aircraft toward the runway. The sky is clear and the weather conditions are ideal for takeoff. As the plane accelerates, the powerful engines generate enough thrust to lift the massive aircraft into the air. The wheels leave the runway smoothly and the city below becomes smaller with every passing second. The aircraft climbs higher and begins its journey across distant landscapes, oceans, and mountains while maintaining stability and direction.`,

`Modern aviation technology has transformed air travel into one of the safest and fastest transportation systems in the world. Pilots rely on advanced navigation systems, radar communication, and automated flight controls to ensure a smooth journey. Turbulence may occasionally shake the cabin, but experienced crew members handle every situation with professionalism and calmness. During long flights, passengers enjoy comfort while the aircraft maintains altitude and speed through changing atmospheric conditions. The coordination between pilots, engineers, and air traffic controllers ensures that every landing is executed with precision and accuracy at the final destination airport.`,

`International air travel connects continents and cultures, allowing millions of people to explore new destinations every day. Aircraft design focuses on aerodynamics, fuel efficiency, and passenger safety to meet global aviation standards. Engineers continuously innovate to improve engine performance and reduce environmental impact. From takeoff to cruising altitude and final descent, every phase of flight requires careful monitoring and precise timing. As the aircraft approaches the runway, the landing gear deploys and the engines gradually reduce thrust, guiding the plane toward a safe and controlled landing experience for everyone onboard.`
];

let level = 0;
let startTime;
let timerInterval;
let inactivityTimer;
let bestRecord = localStorage.getItem("bestFlightTime");

if(bestRecord){
    document.getElementById("bestTime").textContent = bestRecord + " sec";
}

const paragraphDisplay = document.getElementById("paragraph");
const inputBox = document.getElementById("inputBox");
const plane = document.getElementById("plane");
const message = document.getElementById("message");

function startLevel(){
    paragraphDisplay.textContent = paragraphs[level];
    inputBox.value = "";
}

function startGame(){
    startTime = Date.now();
    timerInterval = setInterval(()=>{
        let currentTime = Math.floor((Date.now() - startTime)/1000);
        document.getElementById("timer").textContent = currentTime;
    },1000);
}

function resetInactivity(){
    clearTimeout(inactivityTimer);
    inactivityTimer = setTimeout(()=>{
        crash();
    },3000);
}

function crash(){
    message.textContent = "💥 You're Out!";
    inputBox.disabled = true;
    clearInterval(timerInterval);
}

function completeGame(){
    clearInterval(timerInterval);
    let totalTime = Math.floor((Date.now() - startTime)/1000);

    if(!bestRecord || totalTime < bestRecord){
        localStorage.setItem("bestFlightTime", totalTime);
        message.textContent = "🎉 Congratulations! You Set a New Record in " + totalTime + " seconds!";
    } else {
        message.textContent = "Flight Completed in " + totalTime + " seconds.";
    }

    inputBox.disabled = true;
}

inputBox.addEventListener("input",()=>{
    if(level === 0 && !startTime){
        startGame();
    }

    resetInactivity();

    let typed = inputBox.value;
    let currentText = paragraphs[level];

    if(!currentText.startsWith(typed)){
        crash();
        return;
    }

    plane.style.left = (10 + (typed.length/currentText.length)*70) + "%";

    if(typed === currentText){
        level++;
        if(level < paragraphs.length){
            document.getElementById("level").textContent = level + 1;
            startLevel();
        } else {
            completeGame();
        }
    }
});

startLevel();
</script>

</body>
</html>
